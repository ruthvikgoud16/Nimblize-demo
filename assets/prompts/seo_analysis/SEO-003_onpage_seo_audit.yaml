# Prompt: On-Page SEO Audit
# Nimblize Phase 5 — Prompt Library v1

id: "SEO-003"
category: "seo_analysis"
name: "On-Page SEO Audit"
version: "1.0.0"
purpose: >
  Audit a competitor's on-page SEO elements from scraped page content. Evaluates
  title tags, meta descriptions, heading hierarchy, internal linking, and
  content optimization signals.

recommended_model: "gpt-4o-mini"
temperature: 0.1
max_tokens: 2500

input_variables:
  - name: "page_html_excerpt"
    type: "string"
    description: "Scraped HTML head and body excerpt from competitor page"
  - name: "target_url"
    type: "string"
    description: "URL of the audited page"

output_schema:
  type: "json"
  fields:
    - name: "url"
      type: "string"
    - name: "title_tag"
      type: "object"
      description: "Title tag content and quality assessment"
    - name: "meta_description"
      type: "object"
      description: "Meta description content and quality"
    - name: "heading_hierarchy"
      type: "object"
      description: "H1-H6 structure analysis"
    - name: "content_signals"
      type: "object"
      description: "Word count, keyword density, readability"
    - name: "overall_score"
      type: "integer"
      description: "Score out of 100"
    - name: "recommendations"
      type: "array[string]"

prompt_template: |
  You are an on-page SEO auditor. Analyze the following page content and produce
  a structured audit report.

  AUDIT CRITERIA:
  1. Title Tag: Length (50-60 chars ideal), keyword presence, uniqueness
  2. Meta Description: Length (150-160 chars ideal), call to action, keyword inclusion
  3. Heading Hierarchy: Single H1, logical H2-H6 nesting
  4. Content Quality: Word count, keyword density (1-3% ideal), readability
  5. Score the page 0-100 based on aggregate on-page SEO quality

  TARGET URL: {{ target_url }}

  PAGE CONTENT:
  {{ page_html_excerpt }}

  Return valid JSON:
  {
    "url": "string",
    "title_tag": {"content": "string", "length": int, "quality": "GOOD|FAIR|POOR"},
    "meta_description": {"content": "string", "length": int, "quality": "GOOD|FAIR|POOR"},
    "heading_hierarchy": {"h1_count": int, "h1_text": "string", "structure_valid": bool},
    "content_signals": {"word_count": int, "estimated_keyword_density": "string"},
    "overall_score": 0-100,
    "recommendations": ["array of actionable improvements"]
  }

example_input: |
  target_url: "https://rankvantage.com/features"
  page_html_excerpt: "<title>RankVantage Features - Marketing Attribution</title>
  <meta name='description' content='Explore RankVantage marketing attribution features for B2B teams.'>
  <h1>Features</h1><h2>Attribution Dashboard</h2><p>Track your marketing spend...</p>"

example_output: |
  {
    "url": "https://rankvantage.com/features",
    "title_tag": {"content": "RankVantage Features - Marketing Attribution", "length": 47, "quality": "GOOD"},
    "meta_description": {"content": "Explore RankVantage marketing attribution features for B2B teams.", "length": 65, "quality": "POOR"},
    "heading_hierarchy": {"h1_count": 1, "h1_text": "Features", "structure_valid": true},
    "content_signals": {"word_count": 350, "estimated_keyword_density": "2.1%"},
    "overall_score": 62,
    "recommendations": [
      "Expand meta description to 150-160 characters with clear CTA",
      "Add primary keyword to H1: 'Marketing Attribution Features'",
      "Increase page content to 800+ words for topical depth",
      "Add structured data (FAQ or Product schema)"
    ]
  }

notes: >
  Low temperature for objective audit scoring. Use alongside SEO-001 strategy
  to inform content optimization priorities.

tags:
  - "seo"
  - "audit"
  - "on-page"
  - "technical"
