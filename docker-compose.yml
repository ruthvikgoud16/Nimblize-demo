version: "3.9"

services:

  # ───────────────────────────────────────────────────────────────────────────
  # PostgreSQL + pgvector
  # ───────────────────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nimblize_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nimblize
      POSTGRES_USER: nimblize
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nimblize_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nimblize"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ───────────────────────────────────────────────────────────────────────────
  # Redis (Rate Limiting + Queues + Semantic Cache)
  # ───────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nimblize_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ───────────────────────────────────────────────────────────────────────────
  # FastAPI Gateway
  # ───────────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nimblize_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://nimblize:${POSTGRES_PASSWORD:-nimblize_dev}@postgres:5432/nimblize
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      JWT_SECRET: ${JWT_SECRET:-nimblize-dev-secret}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      PAGERDUTY_ROUTING_KEY: ${PAGERDUTY_ROUTING_KEY}
      SENTRY_DSN: ${SENTRY_DSN}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      PROMETHEUS_PORT: 9090
      ENV: production
     ports:
      - "8000:8000"
     healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
     depends_on:
       postgres:
         condition: service_healthy
       redis:
         condition: service_healthy
     command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --workers 4

  # ───────────────────────────────────────────────────────────────────────────
  # Notification Worker
  # ───────────────────────────────────────────────────────────────────────────
  notification_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nimblize_notif_worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://nimblize:${POSTGRES_PASSWORD:-nimblize_dev}@postgres:5432/nimblize
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      PAGERDUTY_ROUTING_KEY: ${PAGERDUTY_ROUTING_KEY}
    depends_on:
      - redis
      - postgres
    command: python workers/notification_worker.py

  # ───────────────────────────────────────────────────────────────────────────
  # Scrape Worker (runs via cron every 72 hours)
  # ───────────────────────────────────────────────────────────────────────────
  scrape_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nimblize_scrape_worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://nimblize:${POSTGRES_PASSWORD:-nimblize_dev}@postgres:5432/nimblize
      REDIS_HOST: redis
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      - postgres
      - api
    # Runs once at startup and every 72h (use an external scheduler in prod)
    command: >
      sh -c "while true; do python workers/scrape_worker.py; sleep 259200; done"

  # ───────────────────────────────────────────────────────────────────────────
  # OpenTelemetry Collector
  # ───────────────────────────────────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: nimblize_otel
    restart: unless-stopped
    ports:
      - "4317:4317"  # GRPC
      - "4318:4318"  # HTTP
    volumes:
      - ./infra/otel-collector-config.yaml:/etc/otelcol/config.yaml

  # ───────────────────────────────────────────────────────────────────────────
  # Prometheus
  # ───────────────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: nimblize_prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml

  # ───────────────────────────────────────────────────────────────────────────
  # Grafana
  # ───────────────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: nimblize_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-nimblize_admin}
    volumes:
      - grafanadata:/var/lib/grafana

volumes:
  pgdata:
  redisdata:
  grafanadata:
